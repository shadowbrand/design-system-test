name: Publish ui

# Publishes @shadowbrand/ui. Unlike tokens (which auto-patch-bumps from Figma
# pushes), ui is hand-authored code whose changes can be patch, minor, or MAJOR
# (a removed prop or renamed class is breaking). Semver can't be inferred from a
# diff, so YOU pick the bump here; CI does the rest. npm Trusted Publishing (OIDC):
# no token stored anywhere.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (patch=fix, minor=added, major=breaking)"
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]

concurrency: publish-ui   # never two publishes racing the version bump

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to push the version bump + tag back to main
      id-token: write        # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          # Node 24 bundles npm >= 11.5.1 (needed for trusted publishing). We DON'T
          # `npm i -g npm@latest` — that in-place self-upgrade intermittently corrupts
          # npm and drops bundled deps like sigstore, breaking `publish --provenance`.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        working-directory: packages/ui
        run: npm ci

      # Gate: don't publish code that doesn't typecheck or build.
      - name: Typecheck
        working-directory: packages/ui
        run: npm run typecheck

      - name: Build
        working-directory: packages/ui
        run: npm run build

      # Gate: a real consumer must be able to typecheck against the built package.
      - name: Consumer typecheck
        working-directory: consumer-check
        run: |
          npm install
          npm run check

      - name: Bump version (${{ inputs.bump }})
        working-directory: packages/ui
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      # Publish FIRST — if it fails, the steps below don't run, so main is never
      # left with a version bump + tag that has no matching release on npm.
      - name: Publish (provenance is automatic with trusted publishing)
        run: npm publish
        working-directory: packages/ui

      - name: Commit the bump + tag back to main (only after a successful publish)
        run: |
          VERSION=$(node -p "require('./packages/ui/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): ui v${VERSION}"
          git tag -a "ui-v${VERSION}" -m "@shadowbrand/ui v${VERSION}"
          git push --follow-tags
