name: Publish tokens

# Run this workflow (or cut a Release) to publish @shadowbrand/tokens.
# It AUTO-BUMPS the patch version every run, so you never have to touch the
# version by hand — Tokens Studio only pushes tokens.json, this handles the rest.
# Uses npm Trusted Publishing (OIDC): no npm token stored anywhere.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to push the version bump back to main
      id-token: write        # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          # Node 24 bundles npm >= 11.5.1 (needed for trusted publishing). We DON'T
          # `npm i -g npm@latest` — that in-place self-upgrade intermittently corrupts
          # npm and drops bundled deps like sigstore, breaking `publish --provenance`.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Bump patch version
        working-directory: packages/tokens
        run: npm version patch --no-git-tag-version

      - name: Build the package from tokens.json
        run: npm run build

      - name: Commit the version bump back to main
        run: |
          VERSION=$(node -p "require('./packages/tokens/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): tokens v${VERSION}"
          git push

      - name: Publish (provenance is automatic with trusted publishing)
        run: npm publish
        working-directory: packages/tokens
