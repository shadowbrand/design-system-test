name: Checks

on:
  pull_request:
    paths: ["packages/ui/**"]
  push:
    branches: [main]
    paths: ["packages/ui/**"]

jobs:
  ui-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: tsc typecheck @shadowbrand/ui
        working-directory: packages/ui
        run: |
          npm ci
          npm run typecheck
